  <text x="134" y="350" fill="#93C5FD" font-size="18" font-family="Courier New, monospace">SELECT s.student_id, s.name, mp.plan_type</text>
  <text x="134" y="386" fill="#93C5FD" font-size="18" font-family="Courier New, monospace">FROM STUDENT s</text>
  <text x="134" y="422" fill="#93C5FD" font-size="18" font-family="Courier New, monospace">LEFT JOIN MESS_PLAN mp ON mp.student_id = s.student_id</text>
  <text x="134" y="458" fill="#93C5FD" font-size="18" font-family="Courier New, monospace">ORDER BY s.student_id;</text>

